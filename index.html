<!DOCTYPE html>
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <title>MICOR Menu</title>  
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
  <link rel="stylesheet" href="style.css?v=1">
  
  <style>
    html, body { touch-action: manipulation; }
    
    .file-upload-wrapper {
      margin: 3vw 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2vw;
    }
    .file-upload-label {
      background-color: red;
      color: white;
      padding: 3vw 6vw;
      border-radius: 2vw;
      cursor: pointer;
      font-size: 4vw;
      text-align: center;
    }
    .file-upload-label:hover { background-color: #0056b3; }
    
    #transferFilename {
      font-size: 4vw;
      max-width: 50%;
      word-break: break-all;
    }
    #transferScreenshot { display: none; }
    
    #notificationBox {
      display: none;
      margin: 2vw auto;
      padding: 3vw;
      background-color: #ffcccc;
      color: red;
      font-size: 4vw;
      border-radius: 2vw;
      max-width: 90%;
      text-align: center;
    }
  </style>
</head>  

<body>  
  <div id="cartOverlay"></div>  

  <div id="orderHistoryPanel" class="order-history-panel">  
    <h2 class="ordertxt">Order History</h2> 
    <div id="orderHistoryContainer"></div>  
    <button id="closeOrderHistoryBtn" class="close-order-history">CLOSE</button>  
  </div>  

  <header>  
    <button id="viewOrderHistoryBtn"><i class="fas fa-file-alt"></i></button>  
    <div class="title">ORDER MENU‎‎ ‎</div>  
    <div class="icon-cart">  
      <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 18 20">  
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"  
          d="M6 15a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm0 0h8m-8 0-1-4m9 4a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm-9-4h10l2-7H3m2 7L3 4m0 0-.792-3H1" />  
      </svg>  
      <span>0</span>  
    </div>  
  </header>  

  <div class="top">  
    <div class="container">  
      <div class="listProduct"></div>  
    </div>
  </div>  

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">MICOR</div>
      <div class="footer-info">
        <p>📞 WhatsApp/Phone: <a id="whatsappLink" href="#" target="_blank">6010-3798-222</a></p>
        <p>© 2025 Created by <strong>Micor</strong></p>
      </div>
      <div class="footer-social">
        <a id="whatsappIcon" href="#"><i class="fab fa-whatsapp"></i></a>
      </div>
    </div>
  </footer>

  <div class="cartTab">  
    <h1>Shopping Cart</h1>  
    <div class="listCart"></div>  
    <h2 class="totalprice">Total: RM 0.00</h2>  
    <div class="btn">  
      <button class="close">CLOSE</button>  
      <button class="checkoutBtn">Checkout</button>  
    </div>  
  </div>  

  <!-- Modal -->
  <div id="nameModal" style="  
      position: fixed;  
      top: 0; left: 0; width: 100%; height: 100%;  
      background: rgba(0, 0, 0, 0.6);  
      display: none; align-items: center; justify-content: center;  
      z-index: 10000;">  

    <div style="  
        background: white;  
        padding: 5vw;  
        border-radius: 3vw;  
        max-width: 90vw;  
        width: 100%;  
        text-align: center;  
        font-family: 'Poppins', sans-serif;">  

      <h2 style="font-size: 5vw;">Enter Your Room Number</h2>  
      <input type="text" id="roomInput" placeholder="example: room 1" style="  
          width: 80%; padding: 3vw; font-size: 5vw; border: 1px solid #ccc;  
          border-radius: 2vw; margin: 4vw 0;" maxlength="15">  

      <h2 style="font-size: 5vw;">Enter Your Phone Number</h2>  
      <input type="text" id="phone" placeholder="example: 012" style="  
          width: 80%; padding: 3vw; font-size: 5vw; border: 1px solid #ccc;  
          border-radius: 2vw; margin: 4vw 0;">  

      <p style="font-size: 4vw; margin: 2vw 0;">
        Please pay <span id="modalTotal">RM 0.00</span> and submit the transfer screenshot below.
      </p>

      <img src="IMG_20260225_175102.jpg" 
           style="width: 80%; max-width: 300px; margin: 4vw 0; border-radius: 2vw;">

      <div id="notificationBox"></div>

      <div class="file-upload-wrapper">
        <label class="file-upload-label" for="transferScreenshot">Choose Screenshot</label>
        <span id="transferFilename">No file chosen</span>
        <input type="file" id="transferScreenshot" accept="image/*">
      </div>

      <div style="display: flex; justify-content: center; gap: 5vw; margin-top: 20px;">
        <button id="backBtn" style="background:black;color:white;border:none;padding:3vw 6vw;font-size:5vw;border-radius:2vw;">
          Back
        </button>

        <button id="submitRoom" style="background:red;color:white;border:none;padding:3vw 6vw;font-size:5vw;border-radius:2vw;">
          Submit
        </button>  
      </div>
    </div>  
  </div>  

  <script src="app.js?v=1"></script>  

  <script>
    // WhatsApp icon click
    document.getElementById('whatsappIcon').addEventListener('click', function() {
      var phone = '60103798222'; 
      window.open('https://wa.me/' + phone, '_blank');
    });

    function syncTotalToModal() {
      var total = document.querySelector('.totalprice');
      var modal = document.getElementById('modalTotal');
      if (total && modal) modal.innerText = total.innerText.replace('Total: ', '');
    }

    document.querySelector('.checkoutBtn').addEventListener('click', function () {
      var cartCount = parseInt(document.querySelector('.icon-cart span').innerText);
      var notification = document.getElementById('notificationBox');

      if (cartCount === 0) {
        notification.innerText = 'Cart is empty. Please add items before checkout!';
        notification.style.display = 'block';
        return;
      }

      syncTotalToModal();
      document.getElementById('nameModal').style.display = 'flex';
      notification.style.display = 'none';
    });

    document.getElementById('backBtn').addEventListener('click', function () {
      document.getElementById('nameModal').style.display = 'none';
    });

    var fileInput = document.getElementById('transferScreenshot');
    var filenameSpan = document.getElementById('transferFilename');
    fileInput.addEventListener('change', function () {
      if (fileInput.files.length > 0) {
        filenameSpan.innerText = fileInput.files[0].name;
        document.getElementById('notificationBox').style.display = 'none';
      } else {
        filenameSpan.innerText = 'No file chosen';
      }
    });
  </script>
</body>  
</html>
