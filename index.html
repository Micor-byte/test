<!DOCTYPE html>
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <title>Food Menu Grid</title>  

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">  
  <link rel="stylesheet" href="style.css?v=1">
</head>  

<body>  
  <div id="cartOverlay"></div>  

  <div id="orderHistoryPanel" class="order-history-panel">  
    <h2 class="ordertxt">Order History </h2> 
    <div id="orderHistoryContainer"></div>  
    <button id="closeOrderHistoryBtn" class="close-order-history">CLOSE </button>  
  </div>  

  <header>  
    <button id="viewOrderHistoryBtn">  
      <i class="fas fa-file-alt"></i>  
    </button>  
    <div class="title">ORDER MENU</div>  
    <div class="icon-cart">  
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 18 20">  
        <path stroke="currentColor" stroke-width="2"  
          d="M6 15a2 2 0 1 0 0 4m8-4a2 2 0 1 0 0 4M5 11h10l2-7H3"/>  
      </svg>  
      <span>0</span>  
    </div>  
  </header>  

  <div class="top">  
    <div class="container">  
      <div class="listProduct"></div>  
    </div>
  </div>  

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">MICOR</div>
      <div class="footer-info">
        <p>📞 WhatsApp/Phone: <a href="tel:0103798222">010-3798-222</a></p>
        <p>© 2025 Created by <strong>Micor</strong></p>
      </div>
    </div>
  </footer>

  <div class="cartTab">  
    <h1>Shopping Cart</h1>  
    <div class="listCart"></div>  
    <h2 class="totalprice">Total: RM 0.00</h2>  
    <div class="btn">  
      <button class="close">CLOSE</button>  
      <button class="checkoutBtn">Checkout</button>  
    </div>  
  </div>  

  <script src="app.js?v=1"></script>  

  <!-- Modal -->
  <div id="nameModal" style="  
      position: fixed;  
      top: 0; left: 0; width: 100%; height: 100%;  
      background: rgba(0, 0, 0, 0.6);  
      display: none; align-items: center; justify-content: center;  
      z-index: 10000;">  

    <div style="  
        background: white;  
        padding: 5vw;  
        border-radius: 3vw;  
        max-width: 90vw;  
        width: 100%;  
        text-align: center;">  

      <!-- ✅ PAYMENT TEXT -->
      <h3>
        Please pay <span id="modalTotal">RM 0.00</span> and submit the transfer screenshot below.
      </h3>

      <!-- ✅ IMAGE -->
      <img src="IMG_20260225_175102.jpg" style="width:100%; margin:10px 0;">

      <h2>Enter Your Room Number</h2>  
      <input type="text" id="roomInput" placeholder="example: room 1">  

      <h2>Enter Your Phone Number</h2>  
      <input type="text" id="phone" placeholder="example: 012">  

      <br><br>

      <input type="file">

      <br><br>

      <button id="backBtn">Back</button>
      <button id="submitRoom">Submit</button>  

    </div>  
  </div>  

  <!-- ✅ ONLY COPY TOTAL (NO LOGIC CHANGE) -->
  <script>
    const checkoutBtn = document.querySelector('.checkoutBtn');
    const modal = document.getElementById('nameModal');

    checkoutBtn.addEventListener('click', () => {
      modal.style.display = 'flex';

      // Copy EXACT same total text
      const totalText = document.querySelector('.totalprice').innerText;
      document.getElementById('modalTotal').innerText = totalText.replace('Total: ', '');
    });

    document.getElementById('backBtn').onclick = () => {
      modal.style.display = 'none';
    };
  </script>

</body>  
</html>
