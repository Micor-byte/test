<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Form</title>

<style>
  body {
    font-family: Arial;
  }

  .modal {
    display: none;
    position: fixed;
    z-index: 1;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
  }

  .modal-content {
    background: white;
    margin: 10% auto;
    padding: 20px;
    width: 300px;
    text-align: center;
  }

  img {
    width: 100%;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h2>Order</h2>

<label>Quantity:</label>
<input type="number" id="qty" value="1" min="1" onchange="calculateTotal()">

<p>Total: RM <span id="totalPrice">0.00</span></p>

<button onclick="openModal()">Checkout</button>

<!-- Modal -->
<div id="paymentModal" class="modal">
  <div class="modal-content">

    <h3>
      Please pay RM <span id="modalTotal">0.00</span> 
      and submit the transfer screenshot to the attachment below.
    </h3>

    <input type="text" placeholder="Enter phone number">

    <img src="IMG_20260225_175102.jpg" alt="QR Code">

    <br><br>

    <input type="file">

    <br><br>

    <button onclick="closeModal()">Submit</button>
  </div>
</div>

<script>
function calculateTotal() {
  let qty = document.getElementById("qty").value;
  let price = 5; // your price per item
  let total = qty * price;

  document.getElementById("totalPrice").innerText = total.toFixed(2);
}

function openModal() {
  document.getElementById("paymentModal").style.display = "block";

  // Copy SAME total into modal
  document.getElementById("modalTotal").innerText =
    document.getElementById("totalPrice").innerText;
}

function closeModal() {
  document.getElementById("paymentModal").style.display = "none";
}
</script>

</body>
</html>
